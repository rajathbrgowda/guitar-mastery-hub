name: Keep Alive

on:
  schedule:
    # Every 10 minutes — keeps Render free tier from sleeping (sleeps after 15 min idle)
    - cron: '*/10 * * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    name: Ping services
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://guitar-mastery-hub.onrender.com/api/health)
          echo "Render /api/health → HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "OK" || echo "WARN: unexpected status $STATUS"

      - name: Ping Render DB health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://guitar-mastery-hub.onrender.com/api/health/db)
          echo "Render /api/health/db → HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "OK" || echo "WARN: unexpected status $STATUS"
