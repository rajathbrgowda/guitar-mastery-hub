name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  quality:
    name: Lint, typecheck & format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Client — lint
        working-directory: client
        run: npm run lint

      - name: Client — typecheck
        working-directory: client
        run: npm run typecheck

      - name: Client — format check
        working-directory: client
        run: npm run format:check

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Server — lint
        working-directory: server
        run: npm run lint

      - name: Server — typecheck
        working-directory: server
        run: npm run typecheck

      - name: Server — format check
        working-directory: server
        run: npm run format:check

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client tests
        working-directory: client
        run: npm run test

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run server tests
        working-directory: server
        run: npm run test
