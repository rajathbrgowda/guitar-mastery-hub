<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1c1917"/>

  <!-- Background accent circles -->
  <circle cx="900" cy="150" r="320" fill="rgba(251,191,36,0.05)"/>
  <circle cx="200" cy="500" r="200" fill="rgba(251,191,36,0.04)"/>

  <!-- Logo / Brand mark -->
  <rect x="80" y="80" width="4" height="60" rx="2" fill="#fbbf24"/>

  <!-- App name -->
  <text x="100" y="128" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="32" fill="#ffffff" letter-spacing="-0.5">Fretwork</text>

  <!-- Headline -->
  <text x="80" y="260" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="72" fill="#ffffff" letter-spacing="-2">Stop starting</text>
  <text x="80" y="350" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="72" fill="#fbbf24" letter-spacing="-2">over.</text>

  <!-- Sub-heading -->
  <text x="80" y="420" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.55)">Track your practice. Follow any curriculum.</text>

  <!-- Feature pills -->
  <rect x="80" y="470" width="160" height="40" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="160" y="496" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">Streak tracking</text>

  <rect x="256" y="470" width="150" height="40" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="331" y="496" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">Mastery map</text>

  <rect x="422" y="470" width="120" height="40" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="482" y="496" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">Free forever</text>

  <!-- CTA -->
  <rect x="80" y="540" width="200" height="50" rx="8" fill="#fbbf24"/>
  <text x="180" y="572" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="18" fill="#1c1917" text-anchor="middle">Get started free</text>

  <!-- Decorative streak calendar dots (top right) -->
  <g opacity="0.6">
    <rect x="900" y="260" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="918" y="260" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="936" y="260" width="12" height="12" rx="3" fill="rgba(251,191,36,0.3)"/>
    <rect x="954" y="260" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="972" y="260" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="990" y="260" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="1008" y="260" width="12" height="12" rx="3" fill="rgba(251,191,36,0.2)"/>

    <rect x="900" y="278" width="12" height="12" rx="3" fill="rgba(251,191,36,0.2)"/>
    <rect x="918" y="278" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="936" y="278" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="954" y="278" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="972" y="278" width="12" height="12" rx="3" fill="rgba(251,191,36,0.3)"/>
    <rect x="990" y="278" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="1008" y="278" width="12" height="12" rx="3" fill="#fbbf24"/>

    <rect x="900" y="296" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="918" y="296" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="936" y="296" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="954" y="296" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="972" y="296" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="990" y="296" width="12" height="12" rx="3" fill="#fbbf24"/>
    <rect x="1008" y="296" width="12" height="12" rx="3" fill="rgba(251,191,36,0.3)"/>
  </g>
  <text x="954" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="middle">21-day streak</text>
